name: CI

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup npm
        run: npm install --global npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Generate i18n messages
        run: npm run generate-i18n

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Check formatting and lint
        run: npm run check

      - name: Typecheck
        run: npm run typecheck

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup npm
        run: npm install --global npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Generate i18n messages
        run: npm run generate-i18n

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run unit tests
        run: npm run test

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup npm
        run: npm install --global npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Generate i18n messages
        run: npm run generate-i18n

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run integration tests
        run: npm run test:integration

  e2e-main:
    name: E2E main (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        browser:
          - chromium
          - firefox
          - webkit

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup npm
        run: npm install --global npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Generate i18n messages
        run: npm run generate-i18n

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright tests
        run: npx playwright test --project ${{ matrix.browser }}

      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-main-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 30

  e2e-special:
    name: E2E ${{ matrix.suite }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: organizations
            config: playwright.organizations.config.ts
            report: playwright-report-organizations
            results: test-results-organizations
          - suite: auth
            config: playwright.auth.config.ts
            report: playwright-report-auth
            results: test-results-auth

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup npm
        run: npm install --global npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Generate i18n messages
        run: npm run generate-i18n

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --config ${{ matrix.config }}

      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-${{ matrix.suite }}
          path: |
            ${{ matrix.report }}/
            ${{ matrix.results }}/
          if-no-files-found: ignore
          retention-days: 30
