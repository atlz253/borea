name: borea

services:
  borea:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: borea:local
    init: true
    env_file:
      - path: ../.env
      - path: ../.env.local
        required: false
    environment:
      HOST: 0.0.0.0
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - borea-data:/app/data

volumes:
  borea-data:
    name: borea-data
