services:
  borea:
    build:
      context: .
    image: borea:local
    init: true
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - borea-data:/app/data

volumes:
  borea-data:
